name = "realtime-proxy"
main = "src/index.ts"
compatibility_date = "2025-06-11"

# Stores pending magic-link tokens (token -> email) with a 15-minute TTL.
# Create the namespaces and paste the returned ids here:
#   npx wrangler kv namespace create AUTH_TOKENS
#   npx wrangler kv namespace create AUTH_TOKENS --preview
[[kv_namespaces]]
binding = "AUTH_TOKENS"
id = "c5eb3022f5e84d9ab0e35f73f03db48e"
preview_id = "ea8c338135f5483799f57060586ea2ac"

# Stores long-lived Composio sessions (sessionToken -> { composioUserId, kind, email? }).
# No TTL: a session lives as long as the app's Keychain entry does. Created for both
# the anonymous first-run identity (/auth/anonymous) and the email identity (/auth/verify).
# Create the namespaces and paste the returned ids here:
#   npx wrangler kv namespace create SESSIONS
#   npx wrangler kv namespace create SESSIONS --preview
[[kv_namespaces]]
binding = "SESSIONS"
# TODO: this namespace does not exist on the speedmac account yet. Create it and paste
# the returned ids here before deploying:
#   npx wrangler kv namespace create SESSIONS
#   npx wrangler kv namespace create SESSIONS --preview
id = "2fc10fdebea845029c7a9854988132d1"
preview_id = "94f18781c0cb41369c37f84f5715d54b"

# Magic-link emails are sent via Resend (no domain required).
# One-time setup before this works:
#   1. Create a free account at https://resend.com using the email you want the
#      link delivered to, then create an API key.
#   2. Store it as a secret (NOT in this file):
#        npx wrangler secret put RESEND_API_KEY
# With the default onboarding@resend.dev sender below, Resend delivers only to the
# email that account signed up with. Add a verified domain in Resend later to send
# to anyone, then change MAGIC_LINK_FROM to an address on that domain.
[vars]
MAGIC_LINK_FROM = "onboarding@resend.dev"
# Public origin of this Worker, used to build the clickable link in the email.
PUBLIC_BASE_URL = "https://realtime-proxy.speedmac.workers.dev"
# Dictation uses the existing Azure AI Foundry gpt-realtime-2.1-mini
# deployment through the same AZURE_OPENAI_API_KEY secret as /realtime.
# The model name is intentionally fixed in src/index.ts so dictation cannot
# silently fall back to another model.
